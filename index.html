<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DN Chat">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#25D366">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/x-icon" href="icons/favicon.ico">
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
<title>DN Chat</title>
<style>
  :root {
    --bg:#0d0f14; --surface:#161a22; --border:#252c3a;
    --accent:#25D366; --accent-dim:#1a9e4b; --danger:#e53e3e;
    --muted:#4a5568; --text:#e2e8f0; --text-dim:#718096;
    --radius:12px;
    --mono:'Google Sans Mono','Roboto Mono',ui-monospace,monospace;
    --display:'Google Sans','Roboto',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:0 0 24px;overflow-x:hidden}
  header{width:100%;padding:13px 16px 11px;border-bottom:1px solid var(--border);background:var(--surface);display:grid;grid-template-columns:32px 1fr 32px;align-items:center}
  header h1{font-family:var(--display);font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.04em;text-transform:uppercase;text-align:center}
  .btn-settings{background:none;border:none;cursor:pointer;color:var(--text-dim);padding:4px;display:flex;align-items:center;justify-content:center;border-radius:8px;justify-self:end}
  .btn-settings:active{color:var(--text)}
  .card{width:100%;max-width:440px;padding:13px 15px;display:flex;flex-direction:column;gap:11px}
  .section-label{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .preview{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px;font-size:13px;line-height:1.65;color:var(--text-dim);min-height:88px;white-space:pre-wrap;word-break:break-word}
  .preview.has-content{color:var(--text)}
  .preview-line-title{color:var(--text);font-weight:700}
  .preview-line-accent{color:var(--accent)}
  .title-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px}
  .title-text{font-size:13px;font-weight:600;color:var(--text-dim);font-family:var(--display);transition:color .15s}
  .title-text.active{color:var(--text)}
  .toggle-wrap{display:flex;align-items:center;gap:7px}
  .toggle-hint{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .toggle{position:relative;width:38px;height:22px;cursor:pointer;flex-shrink:0}
  .toggle input{display:none}
  .toggle-track{position:absolute;inset:0;border-radius:100px;background:var(--border);transition:background .2s}
  .toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--muted);transition:transform .2s,background .2s}
  .toggle input:checked~.toggle-track{background:var(--accent-dim)}
  .toggle input:checked~.toggle-thumb{transform:translateX(16px);background:var(--accent)}
  .member-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px}
  .group-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:600}
  .members-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .members-grid:last-child{margin-bottom:0}
  .member-chip input[type=checkbox]{display:none}
  .member-chip label{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;user-select:none}
  .chip-avatar{width:44px;height:44px;border-radius:50%;background:var(--bg);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;transition:border-color .15s,transform .15s,box-shadow .15s;line-height:1}
  .chip-name{font-size:8px;color:var(--text-dim);letter-spacing:.04em;text-transform:uppercase;transition:color .15s;max-width:48px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .member-chip input:checked+label .chip-avatar{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,211,102,.18);transform:scale(1.07)}
  .member-chip input:checked+label .chip-name{color:var(--accent)}
  .group-divider{border:none;border-top:1px dashed var(--border);margin:8px 0 10px}
  .actions-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px}
  .actions-grid{display:flex;flex-wrap:wrap;gap:6px}
  .action-chip input[type=radio]{display:none}
  .action-chip label{display:inline-block;padding:6px 12px;border-radius:100px;border:1.5px solid var(--border);background:var(--bg);font-size:12px;font-family:var(--mono);color:var(--text-dim);cursor:pointer;transition:all .15s;user-select:none}
  .action-chip input:checked+label{border-color:var(--accent);color:var(--accent);background:rgba(37,211,102,.08)}
  .datetime-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .dt-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;display:flex;flex-direction:column;gap:3px}
  .dt-label-row{display:flex;align-items:center;gap:5px}
  .auto-badge{font-size:8px;color:var(--accent);letter-spacing:.05em;transition:opacity .2s}
  .dt-box input{background:transparent;border:none;outline:none;font-family:var(--mono);font-size:15px;font-weight:600;color:var(--text);width:100%;padding:0;-webkit-appearance:none}
  .dt-box input.dimmed{color:var(--text-dim)}
  .dt-box input[type=time]::-webkit-calendar-picker-indicator,
  .dt-box input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.4);cursor:pointer}
  .btn-send{width:100%;padding:15px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,transform .1s;-webkit-appearance:none}
  .btn-send:active{background:var(--accent-dim);transform:scale(.98)}
  .btn-copy{width:100%;padding:11px;background:transparent;color:var(--text-dim);border:1px solid var(--border);border-radius:var(--radius);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:color .15s,border-color .15s;-webkit-appearance:none}
  .btn-copy:active{color:var(--text);border-color:var(--text-dim)}
  .btn-copy.copied{color:var(--accent);border-color:var(--accent)}
  /* SETTINGS */
  .settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
  .settings-overlay.open{opacity:1;pointer-events:all}
  .settings-panel{position:fixed;inset:0;top:auto;height:92dvh;background:var(--bg);border-top:1px solid var(--border);border-radius:18px 18px 0 0;z-index:101;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);overflow:hidden}
  .settings-panel.open{transform:translateY(0)}
  .settings-header{padding:14px 16px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .settings-header h2{font-family:var(--display);font-size:13px;font-weight:700;color:var(--text);letter-spacing:.04em;text-transform:uppercase}
  .btn-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:20px;line-height:1;padding:2px 8px;border-radius:6px}
  .btn-close:active{color:var(--text)}
  .autosave-badge{font-size:9px;color:var(--accent);opacity:0;transition:opacity .3s;letter-spacing:.08em}
  .autosave-badge.show{opacity:1}
  .settings-body{flex:1;overflow-y:auto;padding:14px 15px 10px;display:flex;flex-direction:column;gap:18px}
  .s-field{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px}
  .s-field input{background:transparent;border:none;outline:none;font-family:var(--display);font-size:14px;font-weight:600;color:var(--text);width:100%;padding:0}
  .s-field input::placeholder{color:var(--muted)}
  /* 2-col member grid in settings */
  .s-members-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
  .s-member-row{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .btn-emoji{width:38px;flex-shrink:0;background:none;border:none;border-right:1px solid var(--border);font-size:18px;cursor:pointer;padding:8px 0;text-align:center;line-height:1;transition:background .15s;user-select:none}
  .btn-emoji:active{background:var(--border)}
  .s-inp-name{flex:1;min-width:0;background:transparent;border:none;outline:none;font-family:var(--mono);font-size:12px;color:var(--text);padding:8px 6px}
  .s-inp-name::placeholder{color:var(--muted)}
  .btn-del{background:none;border:none;border-left:1px solid var(--border);cursor:pointer;color:var(--muted);font-size:13px;padding:0 8px;align-self:stretch;transition:color .15s,background .15s;flex-shrink:0}
  .btn-del:active{color:var(--danger);background:rgba(229,62,62,.08)}
  .btn-add-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border:1px dashed var(--border);border-radius:var(--radius);background:none;color:var(--text-dim);font-family:var(--mono);font-size:12px;cursor:pointer;transition:border-color .15s,color .15s;letter-spacing:.06em;width:100%}
  .btn-add-row:active{border-color:var(--accent);color:var(--accent)}
  .s-actions-list{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
  .s-action-row{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .s-action-row input{flex:1;background:transparent;border:none;outline:none;font-family:var(--mono);font-size:13px;color:var(--text);padding:10px 12px}
  .s-action-row input::placeholder{color:var(--muted)}
  .settings-footer{padding:10px 15px 14px;flex-shrink:0;border-top:1px solid var(--border)}
  .btn-done{width:100%;padding:14px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background .15s;-webkit-appearance:none}
  .btn-done:active{background:var(--accent-dim)}
</style>
</head>
<body>

<script>
const DEFAULTS = {
  title: "Ліс Єдиний 🌲",
  main: [
    {emoji:"🦊",name:"Лис"},{emoji:"🐺",name:"Вовк"},
    {emoji:"🦅",name:"Орел"},{emoji:"🐻",name:"Ведмідь"},
  ],
  add: [
    {emoji:"🦝",name:"Єнот"},{emoji:"🦌",name:"Олень"},{emoji:"🐗",name:"Кабан"},
  ],
  actions: ["Збір","Тренування","Виїзд","Марш","Повернення"],
};
</script>

<header>
  <span></span>
  <h1 id="header-title">DN Chat</h1>
  <button class="btn-settings" id="btn-settings">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</header>

<div class="card">
  <div>
    <div class="section-label">Повідомлення</div>
    <div class="preview" id="preview">Оберіть параметри нижче…</div>
  </div>
  <div>
    <div class="section-label">Заголовок</div>
    <div class="title-row">
      <span class="title-text active" id="title-text"></span>
      <div class="toggle-wrap">
        <span class="toggle-hint">Вкл.</span>
        <label class="toggle">
          <input type="checkbox" id="title-toggle" checked>
          <div class="toggle-track"></div><div class="toggle-thumb"></div>
        </label>
      </div>
    </div>
  </div>
  <div>
    <div class="section-label">Склад</div>
    <div class="member-section">
      <div class="group-label">Основний</div>
      <div class="members-grid" id="main-grid"></div>
      <hr class="group-divider">
      <div class="group-label">Додатковий</div>
      <div class="members-grid" id="add-grid"></div>
    </div>
  </div>
  <div>
    <div class="section-label">Дія</div>
    <div class="actions-wrap"><div class="actions-grid" id="actions-grid"></div></div>
  </div>
  <div>
    <div class="section-label">Час і дата</div>
    <div class="datetime-row">
      <div class="dt-box">
        <div class="dt-label-row">
          <span class="section-label" style="margin:0">Час</span>
          <span class="auto-badge" id="auto-badge">● авто</span>
        </div>
        <input type="time" id="inp-time" class="dimmed">
      </div>
      <div class="dt-box">
        <div class="section-label">Дата</div>
        <input type="date" id="inp-date">
      </div>
    </div>
  </div>
  <button class="btn-send" id="btn-send">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/>
    </svg>
    Відправити у WhatsApp
  </button>
  <button class="btn-copy" id="btn-copy">⎘ Скопіювати текст</button>
</div>

<div class="settings-overlay" id="settings-overlay"></div>
<div class="settings-panel" id="settings-panel">
  <div class="settings-header">
    <h2>⚙ Налаштування</h2>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="autosave-badge" id="autosave-badge">✓ збережено</span>
      <button class="btn-close" id="btn-close">✕</button>
    </div>
  </div>
  <div class="settings-body">
    <div>
      <div class="section-label">Заголовок</div>
      <div class="s-field"><input type="text" id="s-title" placeholder="Назва команди…"></div>
    </div>
    <div>
      <div class="section-label" style="margin-bottom:8px">Основний склад</div>
      <div class="s-members-grid" id="s-main-grid"></div>
      <button class="btn-add-row" id="s-add-main">+ Додати</button>
    </div>
    <div>
      <div class="section-label" style="margin-bottom:8px">Додатковий склад</div>
      <div class="s-members-grid" id="s-add-grid"></div>
      <button class="btn-add-row" id="s-add-add">+ Додати</button>
    </div>
    <div>
      <div class="section-label" style="margin-bottom:8px">Дії</div>
      <div class="s-actions-list" id="s-actions-list"></div>
      <button class="btn-add-row" id="s-add-action">+ Додати</button>
    </div>
  </div>
  <div class="settings-footer">
    <button class="btn-done" id="btn-done">Готово</button>
  </div>
</div>

<script>
const STORE_KEY = 'dn-store-v1';
function loadCfg(){try{const r=localStorage.getItem(STORE_KEY);if(r)return JSON.parse(r)}catch{}return null}
function saveCfg(c){try{localStorage.setItem(STORE_KEY,JSON.stringify(c))}catch{}}

let CFG = loadCfg() || JSON.parse(JSON.stringify(DEFAULTS));

const previewEl     = document.getElementById('preview');
const mainGrid      = document.getElementById('main-grid');
const addGrid       = document.getElementById('add-grid');
const actionsGrid   = document.getElementById('actions-grid');
const inpTime       = document.getElementById('inp-time');
const inpDate       = document.getElementById('inp-date');
const titleToggle   = document.getElementById('title-toggle');
const titleText     = document.getElementById('title-text');
const autoBadge     = document.getElementById('auto-badge');
const autosaveBadge = document.getElementById('autosave-badge');

// Random emoji pool
const EMOJI_POOL = ['🦊','🐺','🦅','🐻','🦝','🦌','🐗','🐯','🦁','🐮','🐷','🐸','🐧','🦉','🦇','🐻‍❄️','🦬','🦙','🦘','🦡','🦫','🦦','🐿️','🦔','🐇','🦜','🦩','🦚','🦃','🕊️','🦆','🦢','🌲','🌳','🌴','🌵','🍀','🌿','🌱','🍃','🍂','🍁','🪨','⚡','🔥','💧','🌊','❄️','☀️','🌙','⭐','🌟','💫','🌈','🗡️','🛡️','🏹','⚔️','🔱','🪖','🎯','🚀','💪'];
function rndEmoji(){return EMOJI_POOL[Math.floor(Math.random()*EMOJI_POOL.length)]}

// Autosave flash
let saveFlashTimer;
function flashSaved(){
  autosaveBadge.classList.add('show');
  clearTimeout(saveFlashTimer);
  saveFlashTimer=setTimeout(()=>autosaveBadge.classList.remove('show'),1500);
}

// Collect from settings DOM → CFG → save
function collectAndSave(){
  CFG.title = document.getElementById('s-title').value.trim() || DEFAULTS.title;
  CFG.main  = [...document.getElementById('s-main-grid').querySelectorAll('.s-member-row')].map(r=>({
    emoji: r.querySelector('.btn-emoji').textContent.trim()||'🙂',
    name:  r.querySelector('.s-inp-name').value.trim(),
  })).filter(m=>m.name);
  CFG.add   = [...document.getElementById('s-add-grid').querySelectorAll('.s-member-row')].map(r=>({
    emoji: r.querySelector('.btn-emoji').textContent.trim()||'🙂',
    name:  r.querySelector('.s-inp-name').value.trim(),
  })).filter(m=>m.name);
  CFG.actions = [...document.getElementById('s-actions-list').querySelectorAll('input')]
    .map(i=>i.value.trim()).filter(Boolean);
  saveCfg(CFG);
  flashSaved();
  buildUI();
}

// Debounced autosave
let autoSaveTimer;
function scheduleAutosave(){clearTimeout(autoSaveTimer);autoSaveTimer=setTimeout(collectAndSave,600)}

// Helpers
function pad(n){return String(n).padStart(2,'0')}
function nowTime(){const d=new Date();return `${pad(d.getHours())}:${pad(d.getMinutes())}`}
function nowDate(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// Datetime
inpTime.value=nowTime(); inpDate.value=nowDate();
let autoTime=inpTime.value;
function setAutoMode(on){autoBadge.style.opacity=on?'1':'0.25';inpTime.classList.toggle('dimmed',on)}
setAutoMode(true);
inpTime.addEventListener('change',()=>{const isNow=inpTime.value===nowTime();if(isNow)autoTime=inpTime.value;setAutoMode(isNow);updatePreview()});
setInterval(()=>{if(inpTime.value!==autoTime)return;const t=nowTime();if(inpTime.value!==t){inpTime.value=t;autoTime=t;updatePreview()}},10000);
inpDate.addEventListener('input',updatePreview);
titleToggle.addEventListener('change',()=>{titleText.classList.toggle('active',titleToggle.checked);updatePreview()});

// Build main UI
function buildUI(){
  titleText.textContent=CFG.title;
  mainGrid.innerHTML='';
  CFG.main.forEach((m,i)=>{
    const d=document.createElement('div'); d.className='member-chip';
    d.innerHTML=`<input type="checkbox" id="mn${i}" data-name="${esc(m.name)}" checked><label for="mn${i}"><div class="chip-avatar">${m.emoji}</div><div class="chip-name">${esc(m.name)}</div></label>`;
    mainGrid.appendChild(d); d.querySelector('input').addEventListener('change',updatePreview);
  });
  addGrid.innerHTML='';
  CFG.add.forEach((m,i)=>{
    const d=document.createElement('div'); d.className='member-chip';
    d.innerHTML=`<input type="checkbox" id="ad${i}" data-name="${esc(m.name)}"><label for="ad${i}"><div class="chip-avatar">${m.emoji}</div><div class="chip-name">${esc(m.name)}</div></label>`;
    addGrid.appendChild(d); d.querySelector('input').addEventListener('change',updatePreview);
  });
  actionsGrid.innerHTML='';
  CFG.actions.forEach((a,i)=>{
    const d=document.createElement('div'); d.className='action-chip';
    d.innerHTML=`<input type="radio" name="action" id="ac${i}" value="${esc(a)}"><label for="ac${i}">${esc(a)}</label>`;
    actionsGrid.appendChild(d); d.querySelector('input').addEventListener('change',updatePreview);
  });
  updatePreview();
}

function buildMessage(){
  const mainOn=[...mainGrid.querySelectorAll('input:checked')].map(e=>e.dataset.name);
  const addOn=[...addGrid.querySelectorAll('input:checked')].map(e=>e.dataset.name);
  const action=document.querySelector('input[name="action"]:checked')?.value||'';
  const time=inpTime.value;
  const dv=inpDate.value;
  const date=dv?(([y,m,d])=>`${d}.${m}.${y}`)(dv.split('-')):'';
  let roster='';
  if(mainOn.length){roster=`(${mainOn.join(', ')})`;if(addOn.length)roster+=` + ${addOn.join(', ')}`}
  else if(addOn.length)roster=addOn.join(', ');
  const lines=[];
  if(titleToggle.checked)lines.push(CFG.title);
  if(roster)lines.push(roster);
  if(action)lines.push(action);
  if(time)lines.push(time);
  if(date)lines.push(date);
  return lines.join('\n');
}

function updatePreview(){
  const msg=buildMessage();
  if(!msg.trim()){previewEl.textContent='Оберіть параметри нижче…';previewEl.classList.remove('has-content');return}
  previewEl.classList.add('has-content');
  let idx=0;
  previewEl.innerHTML=msg.split('\n').map(l=>{
    let out;
    if(titleToggle.checked&&idx===0)out=`<span class="preview-line-title">${esc(l)}</span>`;
    else if(idx===(titleToggle.checked?1:0))out=`<span class="preview-line-accent">${esc(l)}</span>`;
    else out=esc(l);
    idx++;return out;
  }).join('\n');
}

document.getElementById('btn-send').addEventListener('click',()=>{
  const msg=buildMessage();
  if(!msg.trim()){alert('Спочатку заповніть форму');return}
  window.location.href=`whatsapp://send?text=${encodeURIComponent(msg)}`;
});
document.getElementById('btn-copy').addEventListener('click',async()=>{
  const msg=buildMessage();if(!msg.trim()){alert('Спочатку заповніть форму');return}
  const btn=document.getElementById('btn-copy');
  try{await navigator.clipboard.writeText(msg)}
  catch{const t=document.createElement('textarea');t.value=msg;t.style.cssText='position:fixed;opacity:0';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t)}
  btn.textContent='✓ Скопійовано!';btn.classList.add('copied');
  setTimeout(()=>{btn.textContent='⎘ Скопіювати текст';btn.classList.remove('copied')},2000);
});

// Settings
const overlay=document.getElementById('settings-overlay');
const panel=document.getElementById('settings-panel');

function openSettings(){
  document.getElementById('s-title').value=CFG.title;
  renderSGrid(document.getElementById('s-main-grid'),CFG.main);
  renderSGrid(document.getElementById('s-add-grid'),CFG.add);
  renderSActions(CFG.actions);
  overlay.classList.add('open');panel.classList.add('open');
}
function closeSettings(){collectAndSave();overlay.classList.remove('open');panel.classList.remove('open')}

document.getElementById('btn-settings').addEventListener('click',openSettings);
document.getElementById('btn-close').addEventListener('click',closeSettings);
document.getElementById('btn-done').addEventListener('click',closeSettings);
overlay.addEventListener('click',closeSettings);
document.getElementById('s-title').addEventListener('input',scheduleAutosave);

function makeMemberRow(m){
  const row=document.createElement('div');row.className='s-member-row';
  row.innerHTML=`<button class="btn-emoji">${m.emoji||rndEmoji()}</button><input class="s-inp-name" type="text" value="${esc(m.name)}" placeholder="Ім'я"><button class="btn-del">✕</button>`;
  row.querySelector('.btn-emoji').addEventListener('click',()=>{row.querySelector('.btn-emoji').textContent=rndEmoji();scheduleAutosave()});
  row.querySelector('.s-inp-name').addEventListener('input',scheduleAutosave);
  row.querySelector('.btn-del').addEventListener('click',()=>{row.remove();scheduleAutosave()});
  return row;
}

function renderSGrid(container,arr){container.innerHTML='';arr.forEach(m=>container.appendChild(makeMemberRow(m)))}

function addMember(gridId){
  collectAndSave();
  const container=document.getElementById(gridId);
  const row=makeMemberRow({emoji:rndEmoji(),name:''});
  container.appendChild(row);
  setTimeout(()=>row.querySelector('.s-inp-name').focus(),50);
}

document.getElementById('s-add-main').addEventListener('click',()=>addMember('s-main-grid'));
document.getElementById('s-add-add').addEventListener('click',()=>addMember('s-add-grid'));

function makeActionRow(val){
  const row=document.createElement('div');row.className='s-action-row';
  row.innerHTML=`<input type="text" value="${esc(val)}" placeholder="Назва дії"><button class="btn-del">✕</button>`;
  row.querySelector('input').addEventListener('input',scheduleAutosave);
  row.querySelector('.btn-del').addEventListener('click',()=>{row.remove();scheduleAutosave()});
  return row;
}

function renderSActions(arr){const l=document.getElementById('s-actions-list');l.innerHTML='';arr.forEach(a=>l.appendChild(makeActionRow(a)))}

document.getElementById('s-add-action').addEventListener('click',()=>{
  collectAndSave();
  const l=document.getElementById('s-actions-list');
  const row=makeActionRow('');l.appendChild(row);
  setTimeout(()=>row.querySelector('input').focus(),50);
});

buildUI();
</script>
